<!DOCTYPE html>
<html lang="zh-CN">
  <style>
  /* 1. 撤销大类的 active 样式（当它包含 active 子项时） */
  .sidebar-nav li:has(ul li a.active) > a {
    color: #505d6b !important; /* 恢复灰色 */
    font-weight: normal !important;
    border-right: none !important; /* 移除绿条 */
  }

  /* 2. 强制给当前真正点击的 a.active 加上样式 */
  .sidebar-nav li a.active {
    color: #42b983 !important;
    border-right: 3px solid #42b983 !important;
    display: block;
  }
</style>
<head>
  <meta charset="UTF-8">
  <title>YunShare</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">正在加载...</div>
  <script>
    window.$docsify = {
      loadSidebar: true,
      // 这是为了保证子文件夹里的页面也能找到侧边栏，建议保留
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      subMaxLevel: 0,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索...',
        noData: '找不到结果',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
