<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>YunShare | 云享资源站</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2280%22>☁️</text></svg>">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* --- 1. 核心布局变量 --- */
    :root {
      --sidebar-width: 240px;
    }
    @media screen and (max-width: 768px) {
      :root {
        --sidebar-width: 200px;
      }
    }

    /* --- 2. 电脑端逻辑：侧边栏“推”内容 (Side-by-side) --- */
    .sidebar {
      width: var(--sidebar-width) !important;
      padding-top: 0 !important;
      background: #fff !important;
      transition: transform 0.25s ease-out, width 0.25s ease-out !important;
    }
    section.content {
      /* 电脑端默认 padding，侧边栏占位并把内容“推”向右边 */
      padding-left: var(--sidebar-width) !important;
      transition: all 0.25s ease-out !important;
      position: static !important;
    }
    /* 电脑端收起菜单时（Docsify 默认逻辑） */
    body.close section.content {
      padding-left: 0 !important;
    }

    /* --- 3. 手机端逻辑：侧边栏“悬浮”覆盖 (Overlay) --- */
    @media screen and (max-width: 768px) {
      /* 强制正文不位移、不缩小，稳如泰山 */
      section.content {
        padding-left: 0 !important;
        transform: none !important; 
        transition: none !important;
      }
      /* 侧边栏改为高层级悬浮，直接盖在正文上面 */
      .sidebar {
        position: fixed !important;
        z-index: 100 !important;
        height: 100% !important;
        /* 初始状态隐藏在左侧外 */
        transform: translateX(calc(-1 * var(--sidebar-width))) !important;
      }
      /* 手机端打开菜单时滑入 */
      body:not(.close) .sidebar {
        transform: translateX(0) !important;
        box-shadow: 10px 0 25px rgba(0,0,0,0.1);
      }
      /* 确保内部元素可见 */
      .sidebar-nav, .search {
        display: block !important;
        visibility: visible !important;
      }
    }

    /* --- 4. 样式细节 (参考好用斋对齐) --- */
    .app-name { display: none !important; }
    .search {
      margin: 0 !important;
      padding: 25px 15px 15px 15px !important;
      height: 80px !important;
      background: #fff;
      box-sizing: border-box !important;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .search input {
      border-radius: 8px !important;
      background: #f3f4f6 !important;
      font-size: 13px !important;
    }
    .sidebar-nav li a.active {
      color: #42b983 !important;
      font-weight: 600 !important;
      border-right: 3px solid #42b983 !important;
    }
    .markdown-section {
      max-width: 1000px !important;
      padding: 30px 60px !important; /* 左对齐并预留舒适间距 */
      margin: 0 !important;
    }
    .markdown-section hr { margin: 15px 0 !important; height: 1px !important; }
  </style>
</head>
<body>
  <div id="app">🏃 正在加载 YunShare...</div>
  <script>
    window.$docsify = {
      loadSidebar: true,
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      subMaxLevel: 0,
      auto2top: true,
      search: {
        paths: 'auto',
        placeholder: '搜索资源...',
        noData: '未找到结果',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
