<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>YunShare | 云享资源站</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2280%22>☁️</text></svg>">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
<style>
  /* 1. 定义侧边栏宽度：电脑 220px / 手机 180px */
  .sidebar {
    width: 220px !important;
  }
  
  /* 2. 核心修正：用 padding 实现“推拉”，并增加动画过渡 */
  section.content {
    left: 0 !important; /* 把之前写死的 left 归零，交给 padding 处理 */
    padding-left: 220px !important;
    transition: padding-left 0.25s ease !important; /* 增加滑动的丝滑感 */
  }

  /* 3. 当菜单关闭时（body 有 close 类），padding 归零，内容才会推回来 */
  body.close section.content {
    padding-left: 0 !important;
  }

  /* 4. 手机端适配 */
  @media screen and (max-width: 768px) {
    .sidebar {
      width: 180px !important;
    }
    section.content {
      padding-left: 0 !important; /* 手机端由 Docsify 原生位移接管 */
    }
  }
</style>
</head>
<body>
  <div id="app">🏃 正在加载 YunShare...</div>
  <script>
    window.$docsify = {
      loadSidebar: true,
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      subMaxLevel: 0,
      auto2top: true,
      search: {
        paths: 'auto',
        placeholder: '搜索资源...',
        noData: '未找到结果',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
