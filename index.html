<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>YunShare | 云享资源站</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2280%22>☁️</text></svg>">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* --- 1. 锁死搜索框与侧边栏 (还原好用斋布局) --- */
    .app-name { display: none !important; }
    .sidebar { padding-top: 0 !important; }
    .search {
      margin: 0 !important;
      padding: 25px 15px 15px 15px !important;
      height: 80px !important;
      background: #fff;
      box-sizing: border-box !important;
    }
    .sidebar-nav li a.active {
      color: #42b983 !important;
      font-weight: 600 !important;
      border-right: 3px solid #42b983 !important; /* 右侧绿条 */
    }

    /* --- 2. 压缩间距 (因为你现在加了空行，这里设小一点才精致) --- */
    .markdown-section { padding-top: 15px !important; }
    .markdown-section hr { margin: 15px 0 !important; height: 1px !important; }
    .markdown-section h1, .markdown-section h2, .markdown-section h3 {
      margin-top: 20px !important;
      margin-bottom: 10px !important;
      padding: 0 !important;
    }
    .markdown-section p, .markdown-section ul, .markdown-section ol {
      margin-top: 0 !important;
      margin-bottom: 8px !important;
    }
    .markdown-section li { margin-bottom: 4px !important; }
/* --- 1. 定义全局宽度变量 (240px 左右最合适) --- */
  :root {
    --sidebar-width: 250px; 
  }

  /* --- 2. 电脑端：调整侧边栏和内容区宽度 --- */
  .sidebar {
    width: var(--sidebar-width) !important;
  }
  
  /* 调整内容区的起始位置 */
  section.content {
    padding-left: var(--sidebar-width) !important;
  }

  /* --- 3. 手机端：默认开启且支持开关 --- */
  @media screen and (max-width: 768px) {
    /* 默认让 body 保持“开启”状态的布局 */
    body {
      overflow-x: hidden;
    }

    /* 强制侧边栏显示，且不遮挡内容（向右推开内容） */
    .sidebar {
      transform: translateX(0) !important;
      transition: transform 0.3s ease !important;
    }

    /* 内容区向右平移，腾出空间 */
    section.content {
      transform: translateX(var(--sidebar-width)) !important;
      padding-left: 0 !important;
      transition: transform 0.3s ease !important;
    }

    /* 当你点击按钮关闭时（Docsify 会给 body 加 .close 类） */
    body.close .sidebar {
      transform: translateX(calc(-1 * var(--sidebar-width))) !important;
    }

    body.close .content {
      transform: translateX(0) !important;
    }

    /* 调整开关按钮的位置，让它跟着内容区走 */
    .sidebar-toggle {
      left: var(--sidebar-width) !important;
      background: rgba(255, 255, 255, 0.8) !important;
      padding: 10px !important;
      width: auto !important;
    }

    /* 修复“侧边栏空了”的问题：确保导航链接强制显示 */
    .sidebar-nav {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }
  }

  /* --- 4. 细节优化：搜索框自适应 --- */
  .search {
    padding: 10px 15px !important;
  }
  </style>
</head>
<body>
  <div id="app">🏃 正在回归经典布局...</div>
  <script>
    window.$docsify = {
      loadSidebar: true,
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      subMaxLevel: 0,
      auto2top: true,
      search: {
        paths: 'auto',
        placeholder: '搜索资源...',
        noData: '未找到结果',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
