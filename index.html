<!DOCTYPE html>
<html lang="zh-CN">
<style>
  /* 1. 彻底移除原有的标题，不留任何占位 */
  .app-name {
    display: none !important;
  }

  /* 2. 侧边栏布局：强制从顶部开始，不准弹性跳动 */
  .sidebar {
    padding-top: 0 !important;
    display: flex !important;
    flex-direction: column !important;
    align-items: stretch !important;
  }

  /* 3. 搜索框：强制排在第 1 位，高度和顶部间距焊死 */
  .search {
    order: -1 !important; /* 强制排在最顶端 */
    margin: 0 !important;
    padding: 25px 15px 10px 15px !important; /* 25px 是距离浏览器顶部的距离 */
    background: #fff !important;
    z-index: 10;
  }

  .search input {
    height: 38px !important;
    border: 1px solid #e0e0e0 !important;
    border-radius: 4px !important;
  }

  /* 4. 菜单颜色逻辑：点哪哪绿 */
  
  /* 默认所有链接都是灰色 */
  .sidebar-nav a {
    color: #505d6b !important;
    text-decoration: none !important;
    font-weight: normal !important;
  }

  /* 只要被选中(active)就变绿 */
  .sidebar-nav a.active {
    color: #42b983 !important;
    font-weight: bold !important;
  }

  /* 【核心黑科技】如果子项目(li)里有绿色的 active，
     那么它的父级(大类)就强行变回灰色，不准跟着绿 */
  .sidebar-nav li:has(li a.active) > a {
    color: #505d6b !important;
    font-weight: normal !important;
  }

  /* 悬停效果：保持丝滑 */
  .sidebar-nav a:hover {
    color: #42b983 !important;
  }
</style>
<head>
  <meta charset="UTF-8">
  <title>YunShare - 资源站</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">资源加载中，请稍候...</div>

  <script>
    window.$docsify = {
      el: '#app', // 显式指定挂载盒子的 ID
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      subMaxLevel: 0,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索资源...',
        noData: '找不到结果',
        depth: 6
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
