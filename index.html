<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>YunShare</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* 1. 彻底移除顶部重复标题 */
    .app-name {
      display: none !important;
    }
    /* 2. 锁死搜索框位置，防止页面切换或加载时跳动 */
    .sidebar {
      padding-top: 0 !important;
    }
    .search {
      margin: 0 !important;
      padding: 25px 15px 15px 15px !important; /* 25px 离顶，确保位置固定 */
      background: #fff;
    }
    .search input {
      height: 36px !important;
    }
    /* 3. 核心颜色逻辑：点哪哪绿 */
    /* 默认所有链接为深灰色 */
    .sidebar-nav a {
      color: #505d6b !important;
      text-decoration: none !important;
    }
    /* 点击后常绿状态 (Docsify 自动生成的 active 类) */
    .sidebar-nav li a.active {
      color: #42b983 !important;
      font-weight: bold !important;
    }
    /* 排除逻辑：如果子项(li)里有绿色的 active，父级(大类)强行变回灰色 */
    .sidebar-nav li:has(li a.active) > a {
      color: #505d6b !important;
      font-weight: normal !important;
    }
    /* 悬停效果 */
    .sidebar-nav a:hover {
      color: #42b983 !important;
    }
  </style>
</head>
<body>
  <div id="app">资源加载中，请稍候...</div>
  <script>
    window.$docsify = {
      // 不设置 name，彻底去掉重复标题
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      subMaxLevel: 0,
      themeColor: '#42b983',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索资源...',
        noData: '找不到结果',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
