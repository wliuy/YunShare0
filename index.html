<!DOCTYPE html>
<html lang="zh-CN">
<style>
  /* 1. 彻底移除重复的标题，不留痕迹 */
  .app-name {
    display: none !important;
  }

  /* 2. 搜索框位置：绝对锁死，预防“没内容时会跳” */
  .sidebar {
    padding-top: 0 !important;
    display: flex !important;
    flex-direction: column !important;
  }

  .search {
    order: -1 !important; /* 强制排在最上方 */
    margin: 0 !important;
    padding: 25px 15px 15px 15px !important; /* 25px 离顶，15px 离底 */
    background: #fff !important;
    height: 80px !important; /* 固定整个搜索区域高度 */
    box-sizing: border-box !important;
  }

  /* 3. 侧边栏菜单颜色逻辑：核心部分 */

  /* 默认所有链接：深灰色，正常粗细 */
  .sidebar-nav a {
    color: #505d6b !important;
    font-weight: normal !important;
    text-decoration: none !important;
  }

  /* 【点击后常绿】只要是 Docsify 认定的活动链接，都变绿并加粗 */
  .sidebar-nav li a.active {
    color: #42b983 !important;
    font-weight: bold !important;
  }

  /* 【独占逻辑】当你在看具体的“小类”时，强制让它上级的“大类”变回灰色 */
  /* 逻辑：如果 <li> 里面包含了一个绿色的子项，那么这个 <li> 直属的第一个 <a> 必须变灰 */
  .sidebar-nav li:has(ul li a.active) > a {
    color: #505d6b !important;
    font-weight: normal !important;
  }

  /* 悬停效果：保持丝滑，不影响点击后的常绿 */
  .sidebar-nav a:hover {
    color: #42b983 !important;
  }

  /* 移除搜索框聚焦时的默认阴影，防止视觉抖动 */
  .search input:focus {
    box-shadow: none !important;
    border-color: #42b983 !important;
  }
</style>
<head>
  <meta charset="UTF-8">
  <title>YunShare - 资源站</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">资源加载中，请稍候...</div>

  <script>
    window.$docsify = {
      el: '#app', // 显式指定挂载盒子的 ID
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      subMaxLevel: 0,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索资源...',
        noData: '找不到结果',
        depth: 6
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
