<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>YunShare | 云享资源站</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/docsify@4/lib/themes/github.css">
  <style>
    /* 锁定搜索框，解决跳动 */
    .app-name { display: none !important; }
    .sidebar { padding-top: 0 !important; background-color: #f6f8fa !important; }
    .search { margin: 0 !important; padding: 20px 15px !important; background: #f6f8fa !important; height: 80px !important; box-sizing: border-box !important; }
    /* 侧边栏绿条 */
    .sidebar-nav li a.active { color: #42b983 !important; border-right: 3px solid #42b983 !important; font-weight: 600 !important; }
    /* 压缩间距，因为你现在加了空行，这里的间距会很舒服 */
    .markdown-section { padding: 30px 45px !important; }
    .markdown-section hr { margin: 15px 0 !important; }
    .markdown-section h1, .markdown-section h2, .markdown-section h3 { margin-top: 20px !important; margin-bottom: 10px !important; }
  </style>
</head>
<body>
  <div id="app">🏃 正在加载，如果长时间没反应请检查网络...</div>
  <script>
    window.$docsify = {
      loadSidebar: true,
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      subMaxLevel: 0,
      auto2top: true,
      search: {
        paths: 'auto',
        placeholder: '搜索资源...',
        noData: '找不到',
        depth: 6
      }
    }
  </script>
  <script src="https://unpkg.com/docsify@4/lib/docsify.min.js"></script>
  <script src="https://unpkg.com/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
