<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>YunShare | 云享资源站</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2280%22>☁️</text></svg>">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* --- 1. 布局变量 --- */
    :root {
      --sidebar-width: 240px;
    }
    @media screen and (max-width: 768px) {
      :root {
        --sidebar-width: 200px;
      }
    }
    /* --- 2. 核心“推拉”逻辑 --- */
    .sidebar {
      width: var(--sidebar-width) !important;
      padding-top: 0 !important;
      background: #fff !important;
      transition: transform 0.25s ease !important;
    }
    section.content {
      /* 核心：通过 padding 实现推拉，全端统一 */
      padding-left: var(--sidebar-width) !important;
      position: static !important;
      transition: padding-left 0.25s ease !important;
    }
    /* 菜单关闭时，内容区回归 */
    body.close section.content {
      padding-left: 0 !important;
    }
    /* --- 3. 内容区对齐与间距 (参考好用斋) --- */
    .markdown-section {
      max-width: 1000px !important;
      /* 电脑端 100px 间距，解决“太近”问题 */
      padding: 40px 100px !important; 
      margin: 0 !important; /* 保持左对齐 */
    }
    @media screen and (max-width: 768px) {
      .markdown-section {
        /* 手机端空间有限，间距设小 */
        padding: 20px 15px !important;
      }
    }
    /* --- 4. 搜索框与 UI 细节 --- */
    .app-name { display: none !important; }
    .search {
      margin: 0 !important;
      padding: 25px 15px 15px 15px !important;
      height: 80px !important;
      background: #fff;
      box-sizing: border-box !important;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .search input { border-radius: 8px !important; background: #f3f4f6 !important; }
    .sidebar-nav li a.active {
      color: #42b983 !important;
      font-weight: 600 !important;
      border-right: 3px solid #42b983 !important;
    }
    /* --- 5. 紧凑排版 --- */
    .markdown-section hr { margin: 15px 0 !important; height: 1px !important; }
    .markdown-section h1, .markdown-section h2, .markdown-section h3 { margin-top: 25px !important; }
  </style>
</head>
<body>
  <div id="app">🏃 正在加载 YunShare...</div>
  <script>
    window.$docsify = {
      loadSidebar: true,
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      subMaxLevel: 0,
      auto2top: true,
      search: {
        paths: 'auto',
        placeholder: '搜索资源...',
        noData: '未找到结果',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
