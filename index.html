<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>YunShare</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* 1. 基础布局：锁死顶部，防止搜索框跳动 */
    .app-name { display: none !important; }
    .sidebar { padding-top: 0 !important; border-right: 1px solid #eee !important; }

    /* 2. 搜索框容器：固定高度和位置 */
    .search {
      margin: 0 !important;
      padding: 25px 15px 15px 15px !important;
      background: #fff;
      height: 80px !important;
      box-sizing: border-box !important;
    }
    .search input { border-radius: 4px !important; height: 34px !important; }

    /* 3. 侧边栏菜单：还原“好用斋”点击效果 */
    
    /* 默认状态：灰色文字，右侧预留边框空间 */
    .sidebar-nav li a {
      color: #505d6b !important;
      text-decoration: none !important;
      display: block !important;
      padding: 10px 15px !important;
      border-right: 3px solid transparent !important; /* 预留 3px 边框防止跳动 */
      transition: all 0.2s;
    }

    /* 关键：点击后的常绿状态 (Active) */
    .sidebar-nav li a.active {
      color: #42b983 !important;      /* 文字变绿 */
      font-weight: 600 !important;    /* 稍微加粗 */
      background: transparent !important;
      border-right: 3px solid #42b983 !important; /* 右侧出现绿色条 */
    }

    /* 4. 排除逻辑：当子项绿了，大类不准绿 */
    /* 如果 li 下面的 ul 里的链接是 active，则让当前这个大类 a 变回灰色且去掉绿条 */
    .sidebar-nav li:has(ul li a.active) > a {
      color: #505d6b !important;
      font-weight: normal !important;
      border-right-color: transparent !important;
    }

    /* 悬停效果：仅变色，不出现绿条 */
    .sidebar-nav a:hover {
      color: #42b983 !important;
    }
  </style>
</head>
<body>
  <div id="app">正在加载资源...</div>
  <script>
    window.$docsify = {
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      subMaxLevel: 0,
      themeColor: '#42b983',
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索...',
        noData: '找不到结果',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
