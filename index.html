<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <style>
  /* 1. 强力压缩分割线 (---) 的上下间距 */
  .markdown-section hr {
    margin: 15px 0 !important; /* 原本可能是 2em 以上，现在砍到 15px */
    height: 1px !important;
  }

  /* 2. 强力压缩各级标题的上下边距 */
  .markdown-section h1, 
  .markdown-section h2, 
  .markdown-section h3, 
  .markdown-section h4 {
    margin-top: 20px !important;    /* 标题上方的间距从 1.5em 缩到 20px */
    margin-bottom: 8px !important;  /* 标题下方的间距 */
    padding: 0 !important;
  }

  /* 3. 强力压缩段落、列表、代码块之间的间距 */
  .markdown-section p, 
  .markdown-section ul, 
  .markdown-section ol, 
  .markdown-section pre,
  .markdown-section blockquote {
    margin-top: 0 !important;
    margin-bottom: 8px !important; /* 每个区块下方的间距缩到 8px */
  }

  /* 4. 特别针对你截图里的列表项对齐优化 */
  .markdown-section li {
    margin-bottom: 4px !important;
  }

  /* 5. 调整整体内边距，让内容不要离搜索框太远 */
  .markdown-section {
    padding-top: 10px !important;
  }
/* 核心：强行拉回嵌套在列表里的标题，解决“2往右偏” */
  .markdown-section li h1, 
  .markdown-section li h2, 
  .markdown-section li h3 {
    margin-left: -32px !important; /* 强制向左位移，抵消列表缩进 */
    padding-left: 0 !important;
    display: block !important;
  }

  /* 同样把嵌套在列表里的分割线也拽回来，保持全屏宽度 */
  .markdown-section li hr {
    margin-left: -32px !important;
    width: calc(100% + 32px) !important;
    margin-top: 15px !important;
    margin-bottom: 15px !important;
  }

  /* 去掉标题左侧可能出现的默认图标占位 */
  .anchor {
    margin-left: -20px !important;
  }
</style>
  <meta charset="UTF-8">
  <title>YunShare</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">正在加载...</div>
  <script>
    window.$docsify = {
      loadSidebar: true,
      // 这是为了保证子文件夹里的页面也能找到侧边栏，建议保留
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      subMaxLevel: 0,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索...',
        noData: '找不到结果',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
