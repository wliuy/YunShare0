<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>YunShare | 云享资源站</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2280%22>☁️</text></svg>">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* --- 1. 锁死搜索框与侧边栏 (还原好用斋布局) --- */
    .app-name { display: none !important; }
    .sidebar { padding-top: 0 !important; }
    .search {
      margin: 0 !important;
      padding: 25px 15px 15px 15px !important;
      height: 80px !important;
      background: #fff;
      box-sizing: border-box !important;
    }
    .sidebar-nav li a.active {
      color: #42b983 !important;
      font-weight: 600 !important;
      border-right: 3px solid #42b983 !important; /* 右侧绿条 */
    }

    /* --- 2. 压缩间距 (因为你现在加了空行，这里设小一点才精致) --- */
    .markdown-section { padding-top: 15px !important; }
    .markdown-section hr { margin: 15px 0 !important; height: 1px !important; }
    .markdown-section h1, .markdown-section h2, .markdown-section h3 {
      margin-top: 20px !important;
      margin-bottom: 10px !important;
      padding: 0 !important;
    }
    .markdown-section p, .markdown-section ul, .markdown-section ol {
      margin-top: 0 !important;
      margin-bottom: 8px !important;
    }
    .markdown-section li { margin-bottom: 4px !important; }
/* --- 1. 定义全局宽度变量（把侧边栏缩窄到 220px，更精致） --- */
  :root {
    --sidebar-width: 220px;
  }

  /* --- 2. 电脑端适配 --- */
  .sidebar {
    width: var(--sidebar-width) !important;
  }
  section.content {
    left: var(--sidebar-width) !important;
  }

  /* --- 3. 手机端深度适配（解决空白和内容切断） --- */
  @media screen and (max-width: 768px) {
    /* 强制侧边栏显示，且不使用位移，直接固定宽度 */
    .sidebar {
      transform: translateX(0) !important;
      width: var(--sidebar-width) !important;
      position: fixed !important;
      left: 0 !important;
      transition: none !important;
    }

    /* 修复侧边栏文字消失：强制导航栏显示 */
    .sidebar-nav {
      display: block !important;
      padding: 20px 0 0 15px !important;
      width: 100% !important;
    }

    /* 核心修复：让内容区缩小并靠右，不超出屏幕 */
    section.content {
      position: absolute !important;
      left: var(--sidebar-width) !important;
      width: calc(100% - var(--sidebar-width)) !important; /* 关键：确保宽度不超标 */
      padding: 10px !important;
      transform: none !important;
      transition: none !important;
    }

    /* 隐藏切换按钮（既然默认显示了，就不需要那个会乱跑的按钮了） */
    .sidebar-toggle {
      display: none !important;
    }

    /* 调整表格，让它在窄屏下也能看清 */
    .markdown-section table {
      display: block !important;
      overflow-x: auto !important;
      font-size: 13px !important;
    }
  }

  /* --- 4. 搜索框美化 --- */
  .search {
    padding: 10px 10px !important;
    background: #fff !important;
  }
  .search input {
    width: 90% !important;
    font-size: 13px !important;
  }
  </style>
</head>
<body>
  <div id="app">🏃 正在回归经典布局...</div>
  <script>
    window.$docsify = {
      loadSidebar: true,
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      subMaxLevel: 0,
      auto2top: true,
      search: {
        paths: 'auto',
        placeholder: '搜索资源...',
        noData: '未找到结果',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
