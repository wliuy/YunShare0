<!DOCTYPE html>
<html lang="zh-CN">
  <style>
  /* 1. 基础设定：所有链接默认都是深灰色 */
  .sidebar-nav a {
    color: #34495e !important;
    font-weight: normal !important;
    transition: color 0.3s;
  }

  /* 2. 只要是被选中的链接，都变绿（这是默认规则） */
  .sidebar-nav li a.active {
    color: #42b983 !important;
    font-weight: bold !important;
  }

  /* 3. 核心黑科技：排除法 */
  /* 如果一个大类项目(li)里面包含了一个已经变绿的小类(a.active)，
     那么这个大类自己的标题链接就要强行变回黑色 */
  .sidebar-nav li:has(li a.active) > a {
    color: #34495e !important;
    font-weight: normal !important;
  }

  /* 4. 移除 YunShare 标题后的间距补偿（既然你把它删了） */
  .app-name {
    display: none !important; /* 彻底隐藏标题占位 */
  }
  
  .search {
    margin-bottom: 20px !important; /* 给搜索框下面留点空白，直接接菜单 */
  }
</style>
<head>
  <meta charset="UTF-8">
  <title>YunShare - 资源站</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">资源加载中，请稍候...</div>

  <script>
    window.$docsify = {
      el: '#app', // 显式指定挂载盒子的 ID
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      subMaxLevel: 0,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索资源...',
        noData: '找不到结果',
        depth: 6
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
