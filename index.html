<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>YunShare | 云享资源站</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2280%22>☁️</text></svg>">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* --- 1. 基础布局变量 --- */
    :root {
      --sidebar-width: 240px; /* 电脑端宽度 */
    }
    
    /* --- 2. 电脑端样式 (并排显示) --- */
    .sidebar {
      width: var(--sidebar-width) !important;
      padding-top: 0 !important;
      background-color: #fff !important;
      border-right: 1px solid rgba(0,0,0,.07) !important;
    }
    section.content {
      padding-left: var(--sidebar-width) !important;
    }

    /* --- 3. 手机端专项修复 (关键：悬浮覆盖模式) --- */
    @media screen and (max-width: 768px) {
      /* 强制正文占满全屏，不被挤压 */
      section.content {
        padding-left: 0 !important;
        left: 0 !important;
        position: static !important;
      }
      
      /* 侧边栏改为窄版(190px)悬浮 */
      .sidebar {
        width: 190px !important;
        position: fixed !important;
        left: 0 !important;
        /* 默认隐藏在左侧外 */
        transform: translateX(-190px) !important;
        transition: transform 0.2s ease !important;
        z-index: 100 !important;
        height: 100% !important;
        visibility: visible !important; /* 强制可见 */
      }
      
      /* 当菜单打开时 (Docsify 会移除 body 的 close 类) */
      body:not(.close) .sidebar {
        transform: translateX(0) !important;
        box-shadow: 10px 0 20px rgba(0,0,0,0.1) !important;
      }

      /* 强制让内部菜单和搜索框显示出来，防止“空白” */
      .sidebar-nav, .search {
        display: block !important;
        opacity: 1 !important;
        width: 100% !important;
      }
    }

    /* --- 4. 搜索框美化 (置顶锁定) --- */
    .app-name { display: none !important; }
    .search {
      margin: 0 !important;
      padding: 25px 12px 15px 12px !important;
      height: 80px !important;
      background: #fff;
      box-sizing: border-box !important;
      border-bottom: 1px solid rgba(0,0,0,.05);
    }
    .search input {
      border-radius: 8px !important;
      background: #f3f4f6 !important;
      font-size: 13px !important;
    }
    .sidebar-nav li a.active {
      color: #42b983 !important;
      font-weight: 600 !important;
      border-right: 3px solid #42b983 !important;
    }

    /* --- 5. 紧凑排版优化 --- */
    .markdown-section { padding-top: 15px !important; max-width: 900px !important; }
    .markdown-section hr { margin: 15px 0 !important; height: 1px !important; }
    .markdown-section table { display: block; overflow-x: auto; }
  </style>
</head>
<body>
  <div id="app">🏃 正在加载 YunShare...</div>
  <script>
    window.$docsify = {
      loadSidebar: true,
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      subMaxLevel: 0,
      auto2top: true,
      search: {
        paths: 'auto',
        placeholder: '搜索资源...',
        noData: '未找到结果',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
