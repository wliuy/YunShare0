<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>YunShare | 云享资源站</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2280%22>☁️</text></svg>">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* --- 1. 双端宽度统一定义 --- */
    :root {
      --sidebar-width: 240px; /* 电脑端 */
    }
    @media screen and (max-width: 768px) {
      :root {
        --sidebar-width: 190px; /* 手机端窄版 */
      }
    }

    /* --- 2. 侧边栏与内容区布局修复 --- */
    .sidebar {
      width: var(--sidebar-width) !important;
      padding-top: 0 !important;
      transition: transform 0.25s ease-out !important; /* 恢复丝滑动画 */
    }
    section.content {
      padding-left: var(--sidebar-width) !important;
    }

    /* 手机端专项修复：确保菜单打开时能看到内容 */
    @media screen and (max-width: 768px) {
      section.content {
        padding-left: 0 !important;
      }
      /* 初始状态：隐藏在屏幕左侧 */
      .sidebar {
        transform: translateX(calc(-1 * var(--sidebar-width))) !important;
      }
      /* 激活状态：当 body 没有 close 类时（即打开菜单），移回视野 */
      body:not(.close) .sidebar {
        transform: translateX(0) !important;
      }
      /* 遮罩层逻辑修正 */
      body:not(.close) .sidebar-toggle {
        width: 100%;
        background: rgba(0,0,0,0.1);
      }
    }

    /* --- 3. 搜索框与 UI 精益化 --- */
    .app-name { display: none !important; }
    .search {
      margin: 0 !important;
      padding: 25px 12px 15px 12px !important;
      height: 80px !important;
      background: #fff;
      box-sizing: border-box !important;
      border-bottom: 1px solid rgba(0,0,0,.05);
    }
    .search input {
      border-radius: 8px !important;
      background: #f3f4f6 !important;
      font-size: 13px !important;
    }
    .sidebar-nav {
      padding: 10px 0 !important;
    }
    .sidebar-nav li a.active {
      color: #42b983 !important;
      font-weight: 600 !important;
      border-right: 3px solid #42b983 !important;
    }

    /* --- 4. 文本紧凑排版 --- */
    .markdown-section { padding-top: 15px !important; max-width: 900px !important; }
    .markdown-section hr { margin: 15px 0 !important; height: 1px !important; }
    .markdown-section h1, .markdown-section h2, .markdown-section h3 {
      margin-top: 25px !important;
      margin-bottom: 12px !important;
    }
    .markdown-section p { margin-bottom: 10px !important; }
    .markdown-section table { display: block; overflow-x: auto; }
  </style>
</head>
<body>
  <div id="app">🏃 正在加载 YunShare...</div>
  <script>
    window.$docsify = {
      loadSidebar: true,
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      subMaxLevel: 0,
      auto2top: true,
      search: {
        paths: 'auto',
        placeholder: '搜索资源...',
        noData: '未找到结果',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
